name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. v1.05 becomes 105)"
        required: true

jobs:

  # ---------------------------------------------------------
  # 1. CREATE RELEASE
  # ---------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## What's Changed" > notes.md
          if [ -z "$LAST_TAG" ]; then
            git log --pretty=format:"- %s (%h)" --no-merges >> notes.md
          else
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges >> notes.md
          fi

      - name: Create Release
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --title "Spectral ${{ github.event.inputs.version }}" \
            --notes-file notes.md \
            --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # 2. BUILD UBUNTU
  # ---------------------------------------------------------
  build-ubuntu:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev

      - name: Build Ubuntu
        run: sh MAKE.bat

      - name: Upload Ubuntu Binary
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            Spectral.linux#Spectral-${{ needs.create-release.outputs.version }}.linux \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # 3. BUILD MACOS ARM
  # ---------------------------------------------------------
  build-macos-arm:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS ARM
        run: sh MAKE.bat

      - name: Upload macOS ARM dmg
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            Spectral.dmg#Spectral-${{ needs.create-release.outputs.version }}-ARM64.dmg \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # 4. BUILD MACOS INTEL
  # ---------------------------------------------------------
  build-macos-intel:
    needs: create-release
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS Intel
        run: sh MAKE.bat

      - name: Upload macOS Intel dmg
        run: |
          gh release upload "${{ needs.create-release.outputs.version }}" \
            Spectral.dmg#Spectral-${{ needs.create-release.outputs.version }}-X64.dmg \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------
  # 5. BUILD WINDOWS
  # ---------------------------------------------------------
  build-windows:
    needs
